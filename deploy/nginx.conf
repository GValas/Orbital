server {
    listen       80;
    listen       [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Compress the (text-heavy) single page on the wire.
    gzip            on;
    gzip_vary       on;
    gzip_min_length 256;
    gzip_types      text/html text/css application/javascript image/svg+xml;

    # Headers are declared at server scope so they apply to the page even after
    # try_files internally rewrites "/" to "/index.html". (nginx does NOT merge
    # add_header from a parent scope into a location that sets its own.)
    #
    # The page is regenerated on every image build, so don't let clients cache a
    # stale copy across deploys.
    add_header Cache-Control          "no-cache"       always;
    # Sensible hardening for a static site.
    add_header X-Content-Type-Options "nosniff"        always;
    add_header X-Frame-Options        "SAMEORIGIN"     always;
    add_header Referrer-Policy        "no-referrer"    always;

    # Single-page app: everything resolves to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Don't advertise the nginx version.
    server_tokens off;
}
